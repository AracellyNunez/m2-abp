<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" href="./assets/css/style.css">

    <script defer src="./assets/js/index.js"></script>
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg bg-primary-subtle" data-bs-them="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Sky Wallet</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav">
                    <a class="nav-link active" aria-current="page" href="./index.html">Login</a>
                    <a class="nav-link" href="./inicio.html">Inicio</a>
                    <a class="nav-link" href="./deposit.html">Deposito</a>
                    <a class="nav-link" href="./sendmoney.html">Enviar Dinero</a>
                    <a class="nav-link" href="./transaction.html">Transacciones</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="py-5 container">
        <h1 class="text-center text-primary text-capitalize">Iniciar Sesión</h1>
    </header>

    <main class="container flex-grow-1">
        <div class="row justify-content-center align-items-center">

            <div class="col-12 col-md-6 col-lg-6">

                <div class="card shadow-sm p-4">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="emailInput" class="form-label">Correo Electrónico</label>
                            <input type="email" class="form-control" id="emailInput" placeholder="email@example.com"
                                required>
                        </div>
                        <div class="mb-3">
                            <label for="passwordInput" class="form-label">Contraseña</label>
                            <input type="password" class="form-control" id="passwordInput"
                                placeholder="Introduce tu contraseña" required>
                        </div>

                        <div id="errorAlert" class="mt-3"></div>

                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary">Ingresar</button>
                        </div>
                    </form>

                    <hr>
                    <div class="text-center">
                        <a class="d-block small mb-2" href="#">¿No tienes cuenta? Regístrate</a>
                        <a class="d-block small text-muted" href="#">¿Olvidaste tu contraseña?</a>
                    </div>
                </div>

            </div>
            <div class="col-12 col-md-6 col-lg-6 text-center mt-4 mt-md-0">
                <img src="./assets/img/contraseña.svg" class="img-fluid rounded d-block mx-auto"
                    alt="Ilustración contraseña" width="400">
            </div>
        </div>
    </main>
    <footer class="bg-light text-center py-3 border-top">
        <div class="container">
            <span class="text-muted">© 2026 Aracelly Núñez.</span>
        </div>
    </footer>
</body>

</html>
