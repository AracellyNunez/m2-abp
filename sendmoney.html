<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar dinero</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <link rel="stylesheet" href="./assets/css/style.css">
    <script defer src="./assets/js/sendmoney.js"></script>

</head>

<body>

    <nav class="navbar navbar-expand-lg bg-primary-subtle" data-bs-them="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Sky Wallet</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav">
                    <a class="nav-link" href="./index.html">Login</a>
                    <a class="nav-link" href="./inicio.html">Inicio</a>
                    <a class="nav-link" href="./deposit.html">Deposito</a>
                    <a class="nav-link active" aria-current="page" href="./sendmoney.html">Enviar Dinero</a>
                    <a class="nav-link" href="./transaction.html">Transacciones</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="py-5 container">
        <h1 class="text-center text-primary text-capitalize">Enviar dinero</h1>
    </header>

    <main class="container">
        <section>
            <div class="row justify-content-center align-items-center">

                <div class="col-12 col-md-6 col-lg-6">
                    <h2>Balance cuenta: $ <span id="balance">100.000</span></h2>

                    <form id="formTransferencia">
                        <div class="mb-3">
                            <label for="contacto" class="form-label">Buscar en la agenda de transferencias:</label>
                            <input type="text" class="form-control" name="contacto" id="contacto">
                        </div>

                        <div class="mb-3">
                            <button type="button" class="btn btn-outline-primary btn-sm" data-bs-toggle="modal"
                                data-bs-target="#modalContacto">
                                + Agregar nuevo contacto
                            </button>
                        </div>

                        <ul id="listaContactos" class="list-group mb-3">
                        </ul>

                        <div class="mb-3">
                            <label for="montoEnviar" class="form-label">Monto a enviar ($):</label>
                            <input type="number" class="form-control" id="montoEnviar" placeholder="Ej: 5000" required>
                        </div>

                        <div class="mb-3">
                            <button type="submit" class="btn btn-primary w-100">Enviar dinero</button>
                        </div>
                    </form>
                </div>

                <div class="col-12 col-md-6 col-lg-6 text-center mt-4 mt-md-0">
                    <img src="./assets/img/transferencia.svg" class="img-fluid rounded d-block mx-auto"
                        alt="Ilustración Enviar Dinero" width="500">
                </div>
            </div>
        </section>

        <div class="modal fade" id="modalContacto" tabindex="-1" aria-labelledby="modalContactoLabel"
            aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalContactoLabel">Nuevo Contacto</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form id="formNuevoContacto">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label for="nuevoNombre" class="form-label">Nombre y Apellido</label>
                                <input type="text" class="form-control" id="nuevoNombre" required>
                            </div>
                            <div class="mb-3">
                                <label for="nuevoCbu" class="form-label">N° CBU</label>
                                <input type="text" class="form-control" id="nuevoCbu" required>
                            </div>
                            <div class="mb-3">
                                <label for="nuevoAlias" class="form-label">Alias</label>
                                <input type="text" class="form-control" id="nuevoAlias" required>
                            </div>
                            <div class="mb-3">
                                <label for="nuevoBanco" class="form-label">Banco</label>
                                <input type="text" class="form-control" id="nuevoBanco" required>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary">Guardar Contacto</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <footer class="bg-light text-center py-3 border-top">
        <div class="container">
            <span class="text-muted">© 2026 Aracelly Núñez.</span>
        </div>
    </footer>
</body>

</html>
